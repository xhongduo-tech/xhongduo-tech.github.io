  <style>
    /* ===== Knowledge Tree 专属样式 ===== */
    .kt-hero { margin-bottom: 36px; padding-bottom: 32px; border-bottom: 1px solid var(--border); }
    .kt-hero h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.04em; line-height: 1.15; margin-bottom: 10px; }
    .kt-desc { color: var(--text-muted); font-family: var(--font-mono); font-size: 0.82rem; margin-bottom: 20px; line-height: 1.6; }

    /* 进度栏 */
    .kt-stats { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; margin-bottom: 6px; }
    .kt-stat { font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-muted); }
    .kt-stat strong { color: var(--accent); font-size: 1.05rem; }
    .kt-progress-track { flex: 1; min-width: 120px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .kt-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.6s ease; box-shadow: 0 0 8px var(--accent); }

    /* 图例 */
    .kt-legend { display: flex; gap: 20px; margin-bottom: 32px; font-family: var(--font-mono); font-size: 0.73rem; }
    .kt-legend-item { display: flex; align-items: center; gap: 6px; color: var(--text-muted); }
    .kt-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .kt-legend-dot.done    { background: var(--accent); }
    .kt-legend-dot.pending { background: var(--text-muted); opacity: 0.35; }

    /* 域卡片网格 */
    .kt-domains { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    @media (max-width: 640px) { .kt-domains { grid-template-columns: 1fr; } }

    /* 域卡片 */
    .kt-domain { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .kt-domain-head { padding: 12px 16px 10px; display: flex; align-items: center; justify-content: space-between; gap: 10px; border-bottom: 1px solid var(--border); }
    .kt-domain-title { font-family: var(--font-mono); font-weight: 600; font-size: 0.83rem; letter-spacing: 0.01em; color: var(--text); }
    .kt-domain-badge { font-family: var(--font-mono); font-size: 0.68rem; padding: 2px 7px; border-radius: 20px; border: 1px solid; white-space: nowrap; flex-shrink: 0; }
    .kt-domain-body { padding: 14px 16px 16px; }

    /* 主题分组 */
    .kt-topic { margin-bottom: 14px; }
    .kt-topic:last-child { margin-bottom: 0; }
    .kt-topic-label { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .kt-topic-label::after { content: ''; flex: 1; height: 1px; background: var(--border-dim); }

    /* 节点列表（树线） */
    .kt-nodes { list-style: none; padding: 0 0 0 14px; margin: 0; position: relative; }
    .kt-nodes::before { content: ''; position: absolute; left: 4px; top: 6px; bottom: 6px; width: 1px; background: var(--border); }
    .kt-node-item { position: relative; margin-bottom: 3px; }
    .kt-node-item::before { content: ''; position: absolute; left: -10px; top: 8px; width: 7px; height: 1px; background: var(--border); }

    /* 节点元素 */
    .kt-node {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--font-mono); font-size: 0.71rem; line-height: 1.4;
      padding: 2px 7px; border-radius: 3px; max-width: 100%;
      border: none; background: none; text-align: left; cursor: default;
    }
    .kt-node-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .kt-count { font-size: 0.62rem; opacity: 0.7; margin-left: 2px; flex-shrink: 0; }

    /* 已完成 */
    .kt-node.done { color: #000; cursor: pointer; transition: opacity 0.12s; }
    .kt-node.done:hover { opacity: 0.82; }
    .kt-node.done .kt-node-dot { background: #000; opacity: 0.5; }

    /* 待完成 */
    .kt-node.pending { color: var(--text-muted); }
    .kt-node.pending .kt-node-dot { background: var(--text-muted); opacity: 0.3; }
    .kt-node.pending .kt-count { opacity: 0.45; }

    /* ===== 弹窗 ===== */
    .kt-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 900;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .kt-overlay.open { display: flex; }

    .kt-modal {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 100%; max-width: 540px;
      max-height: 80vh;
      display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      overflow: hidden;
    }
    .kt-modal-head {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
      border-left: 4px solid var(--kt-modal-color, var(--accent));
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
      flex-shrink: 0;
    }
    .kt-modal-info { flex: 1; min-width: 0; }
    .kt-modal-title { font-family: var(--font-mono); font-weight: 700; font-size: 0.92rem; color: var(--text); margin-bottom: 4px; }
    .kt-modal-sub { font-family: var(--font-mono); font-size: 0.73rem; color: var(--text-muted); }
    .kt-modal-close {
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      font-family: var(--font-mono); font-size: 0.8rem; padding: 2px 6px;
      border-radius: 3px; flex-shrink: 0;
      transition: background 0.1s;
    }
    .kt-modal-close:hover { background: var(--border); color: var(--text); }

    .kt-modal-body { overflow-y: auto; padding: 14px 18px; flex: 1; }
    .kt-modal-section { margin-bottom: 16px; }
    .kt-modal-section:last-child { margin-bottom: 0; }
    .kt-modal-section-title {
      font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-muted);
      letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px;
    }

    .kt-article-list { list-style: none; padding: 0; margin: 0; }
    .kt-article-item { margin-bottom: 6px; }
    .kt-article-link {
      display: flex; align-items: baseline; gap: 10px;
      font-family: var(--font-mono); font-size: 0.76rem;
      color: var(--text); text-decoration: none;
      padding: 5px 8px; border-radius: 4px;
      border: 1px solid transparent;
      transition: border-color 0.12s, background 0.12s;
    }
    .kt-article-link:hover {
      border-color: var(--border);
      background: var(--bg-2);
      text-decoration: none;
    }
    .kt-article-date { color: var(--text-muted); font-size: 0.68rem; white-space: nowrap; flex-shrink: 0; }
    .kt-article-title { flex: 1; }
    .kt-article-arrow { color: var(--text-muted); flex-shrink: 0; }

    .kt-pending-info {
      font-family: var(--font-mono); font-size: 0.74rem; color: var(--text-muted);
      padding: 8px 10px; border: 1px dashed var(--border);
      border-radius: 4px; line-height: 1.5;
    }
    .kt-pending-info strong { color: var(--text); }

    .kt-empty-state {
      font-family: var(--font-mono); font-size: 0.76rem; color: var(--text-muted);
      padding: 20px 0; text-align: center;
    }
  </style>

  // ===== 工具函数 =====
  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ===== 渲染与交互逻辑 =====
  (async function init() {
    // 加载 posts.json
    let slugSet = new Set();
    let slugToPost = {};
    try {
      const res = await fetch('posts/posts.json');
      if (res.ok) {
        const posts = await res.json();
        posts.forEach(p => { slugSet.add(p.slug); slugToPost[p.slug] = p; });
      }
    } catch (e) { /* ignore */ }

    // 为每个 group 计算已发布文章列表
    let totalGroups = 0, doneGroups = 0;
    const domainStats = {};
    TREE.forEach(domain => {
      let dd = 0, dt = 0;
      domain.topics.forEach(topic => {
        topic.groups.forEach(g => {
          dt++; totalGroups++;
          g._published = g.all_slugs.filter(s => slugSet.has(s));
          if (g._published.length > 0) { dd++; doneGroups++; }
        });
      });
      domainStats[domain.id] = { groups: dt, done: dd, catTotal: domain.catTotal };
    });

    // 渲染总进度
    const pct = totalGroups > 0 ? Math.round(doneGroups / totalGroups * 100) : 0;
    document.getElementById('kt-stats').innerHTML = `
      <span class="kt-stat"><strong>${doneGroups}</strong> / ${totalGroups} 话题方向已覆盖</span>
      <div class="kt-progress-track"><div class="kt-progress-fill" style="width:${pct}%"></div></div>
      <span class="kt-stat"><strong>${pct}%</strong> · 规划 <strong>1000+</strong> 知识节点</span>
    `;

    // 渲染域卡片
    const container = document.getElementById('kt-domains');
    container.innerHTML = TREE.map(domain => {
      const st = domainStats[domain.id];
      const badgeBg = domain.color + '22';
      const topicsHtml = domain.topics.map(topic => {
        const groupsHtml = topic.groups.map(g => {
          const pub = g._published.length;
          const done = pub > 0;
          const nodeClass = done ? 'done' : 'pending';
          const colorStyle = done ? `background:${domain.color};color:#000;` : '';
          return `<li class="kt-node-item">
            <button class="kt-node ${nodeClass}"
              style="${colorStyle}"
              data-group-id="${encodeURIComponent(JSON.stringify({domainId:domain.id, title:g.title, pub, total:g.total, color:domain.color, slugs:g._published}))}"
              ${done ? '' : 'disabled'}>
              <span class="kt-node-dot"></span>
              ${escapeHtml(g.title)}<span class="kt-count">${pub}/${g.total}</span>
            </button>
          </li>`;
        }).join('');
        return `<div class="kt-topic">
          <div class="kt-topic-label">${escapeHtml(topic.title)}</div>
          <ul class="kt-nodes">${groupsHtml}</ul>
        </div>`;
      }).join('');

      return `<div class="kt-domain">
        <div class="kt-domain-head" style="border-left:3px solid ${domain.color}; padding-left:13px;">
          <span class="kt-domain-title">${escapeHtml(domain.title)}</span>
          <span class="kt-domain-badge" style="color:${domain.color};border-color:${domain.color};background:${badgeBg};">
            ${st.done}/${st.groups} 方向 · ${st.catTotal} 节点
          </span>
        </div>
        <div class="kt-domain-body">${topicsHtml}</div>
      </div>`;
    }).join('');

    // ===== 弹窗逻辑 =====
    const overlay = document.getElementById('kt-overlay');
    const modal   = document.getElementById('kt-modal');
    const btnClose = document.getElementById('kt-modal-close');

    function openModal(groupData) {
      const { title, pub, total, color, slugs } = groupData;
      const pending = total - pub;

      modal.style.setProperty('--kt-modal-color', color);
      document.getElementById('kt-modal-title').textContent = title;
      document.getElementById('kt-modal-sub').textContent =
        `${pub} 篇已发布 · ${total} 个规划节点`;

      const body = document.getElementById('kt-modal-body');
      let html = '';

      if (pub > 0) {
        html += '<div class="kt-modal-section"><div class="kt-modal-section-title">// 已发布文章</div>';
        html += '<ul class="kt-article-list">';
        const sortedSlugs = [...slugs].sort((a, b) => {
          const da = slugToPost[a]?.date || '';
          const db = slugToPost[b]?.date || '';
          return db.localeCompare(da);
        });
        sortedSlugs.forEach(slug => {
          const post = slugToPost[slug];
          if (!post) return;
          html += `<li class="kt-article-item">
            <a class="kt-article-link" href="post.html?slug=${encodeURIComponent(slug)}" target="_self">
              <span class="kt-article-date">${escapeHtml(post.date || '')}</span>
              <span class="kt-article-title">${escapeHtml(post.title || slug)}</span>
              <span class="kt-article-arrow">→</span>
            </a>
          </li>`;
        });
        html += '</ul></div>';
      } else {
        html += '<div class="kt-modal-section"><p class="kt-empty-state">// 该方向文章尚未发布</p></div>';
      }

      if (pending > 0) {
        html += `<div class="kt-modal-section">
          <div class="kt-pending-info">
            // 另有 <strong>${pending}</strong> 个知识节点规划中，持续更新…
          </div>
        </div>`;
      }

      body.innerHTML = html;
      overlay.classList.add('open');
      btnClose.focus();
    }

    function closeModal() {
      overlay.classList.remove('open');
    }

    container.addEventListener('click', e => {
      const btn = e.target.closest('.kt-node.done');
      if (!btn || !btn.dataset.groupId) return;
      try {
        const data = JSON.parse(decodeURIComponent(btn.dataset.groupId));
        openModal(data);
      } catch {}
    });

    btnClose.addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  })();
  </script>
