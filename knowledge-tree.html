  <style>
    /* ===== Knowledge Tree 专属样式 ===== */
    .kt-hero {
      margin-bottom: 36px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }
    .kt-hero h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.15;
      margin-bottom: 10px;
    }
    .kt-desc {
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    /* ===== 进度栏 ===== */
    .kt-stats {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .kt-stat {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .kt-stat strong {
      color: var(--accent);
      font-size: 1.05rem;
    }
    .kt-progress-track {
      flex: 1;
      min-width: 120px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .kt-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.6s ease;
      box-shadow: 0 0 8px var(--accent);
    }

    /* ===== 图例 ===== */
    .kt-legend {
      display: flex;
      gap: 20px;
      margin-bottom: 32px;
      font-family: var(--font-mono);
      font-size: 0.73rem;
    }
    .kt-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
    }
    .kt-legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .kt-legend-dot.done    { background: var(--accent); }
    .kt-legend-dot.pending { background: var(--text-muted); opacity: 0.35; }

    /* ===== 域卡片网格 ===== */
    .kt-domains {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    @media (max-width: 640px) {
      .kt-domains { grid-template-columns: 1fr; }
    }

    /* ===== 域卡片 ===== */
    .kt-domain {
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .kt-domain-head {
      padding: 12px 16px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .kt-domain-title {
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 0.83rem;
      letter-spacing: 0.01em;
      color: var(--text);
    }
    .kt-domain-badge {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      padding: 2px 7px;
      border-radius: 20px;
      border: 1px solid;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .kt-domain-body {
      padding: 14px 16px 16px;
    }

    /* ===== 主题分组 ===== */
    .kt-topic {
      margin-bottom: 14px;
    }
    .kt-topic:last-child { margin-bottom: 0; }

    .kt-topic-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .kt-topic-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-dim);
    }

    /* ===== 节点列表（树线） ===== */
    .kt-nodes {
      list-style: none;
      padding: 0;
      margin: 0;
      position: relative;
      padding-left: 14px;
    }
    .kt-nodes::before {
      content: '';
      position: absolute;
      left: 4px;
      top: 6px;
      bottom: 6px;
      width: 1px;
      background: var(--border);
    }
    .kt-node-item {
      position: relative;
      margin-bottom: 3px;
    }
    .kt-node-item::before {
      content: '';
      position: absolute;
      left: -10px;
      top: 8px;
      width: 7px;
      height: 1px;
      background: var(--border);
    }

    /* ===== 节点元素 ===== */
    .kt-node {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-mono);
      font-size: 0.71rem;
      line-height: 1.4;
      padding: 2px 7px;
      border-radius: 3px;
      max-width: 100%;
      word-break: break-word;
    }
    .kt-node-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .kt-count {
      font-size: 0.62rem;
      opacity: 0.7;
      margin-left: 2px;
      flex-shrink: 0;
    }

    /* 已完成（任意文章命中） */
    .kt-node.done {
      color: #000;
      text-decoration: none;
      transition: opacity 0.12s;
    }
    .kt-node.done:hover { opacity: 0.82; text-decoration: none; }
    .kt-node.done .kt-node-dot { background: #000; opacity: 0.5; }

    /* 待完成 */
    .kt-node.pending {
      color: var(--text-muted);
      cursor: default;
    }
    .kt-node.pending .kt-node-dot {
      background: var(--text-muted);
      opacity: 0.3;
    }
    .kt-node.pending .kt-count {
      opacity: 0.45;
    }
  </style>

  // ===== 渲染逻辑 =====
  (async function renderTree() {
    // 加载 posts.json，构建 slug 集合
    let slugSet = new Set();
    try {
      const res = await fetch('posts/posts.json');
      if (res.ok) {
        const posts = await res.json();
        posts.forEach(p => slugSet.add(p.slug));
      }
    } catch (e) { /* ignore */ }

    // 统计：按发布的文章数 / 规划节点总数
    let totalTopics = 0, doneGroups = 0, totalGroups = 0;
    const domainStats = {};

    TREE.forEach(domain => {
      let domainDone = 0, domainGroups = 0;
      domain.topics.forEach(topic => {
        topic.groups.forEach(g => {
          totalGroups++; domainGroups++;
          totalTopics += g.total;
          const pub = g.done_slugs.filter(s => slugSet.has(s)).length;
          if (pub > 0) { doneGroups++; domainDone++; }
          g._pub = pub; // cache
        });
      });
      domainStats[domain.id] = { groups: domainGroups, done: domainDone, total: domain.catTotal };
    });

    // 渲染总进度（以话题方向计）
    const pct = totalGroups > 0 ? Math.round(doneGroups / totalGroups * 100) : 0;
    document.getElementById('kt-stats').innerHTML = `
      <span class="kt-stat"><strong>${doneGroups}</strong> / ${totalGroups} 话题方向已覆盖</span>
      <div class="kt-progress-track">
        <div class="kt-progress-fill" style="width:${pct}%"></div>
      </div>
      <span class="kt-stat"><strong>${pct}%</strong> · 规划 <strong>${totalTopics.toLocaleString()}</strong> 知识节点</span>
    `;

    // 渲染域卡片
    const container = document.getElementById('kt-domains');
    container.innerHTML = TREE.map(domain => {
      const stats = domainStats[domain.id];
      const badgeBg = domain.color + '22';
      const topicsHtml = domain.topics.map(topic => {
        const groupsHtml = topic.groups.map(g => {
          const pub = g._pub;
          const done = pub > 0;
          const countLabel = `${pub}/${g.total}`;
          if (done) {
            return `<li class="kt-node-item">
              <a class="kt-node done" href="post.html?slug=${encodeURIComponent(g.link)}"
                 style="background:${domain.color};color:#000;">
                <span class="kt-node-dot"></span>
                ${escapeHtml(g.title)}<span class="kt-count">${countLabel}</span>
              </a>
            </li>`;
          } else {
            return `<li class="kt-node-item">
              <span class="kt-node pending">
                <span class="kt-node-dot"></span>
                ${escapeHtml(g.title)}<span class="kt-count">0/${g.total}</span>
              </span>
            </li>`;
          }
        }).join('');
        return `<div class="kt-topic">
          <div class="kt-topic-label">${escapeHtml(topic.title)}</div>
          <ul class="kt-nodes">${groupsHtml}</ul>
        </div>`;
      }).join('');

      return `<div class="kt-domain">
        <div class="kt-domain-head" style="border-left:3px solid ${domain.color}; padding-left:13px;">
          <span class="kt-domain-title">${escapeHtml(domain.title)}</span>
          <span class="kt-domain-badge" style="color:${domain.color};border-color:${domain.color};background:${badgeBg};">
            ${stats.done}/${stats.groups} 方向 · ${stats.total} 节点
          </span>
        </div>
        <div class="kt-domain-body">${topicsHtml}</div>
      </div>`;
    }).join('');
  })();
  </script>
