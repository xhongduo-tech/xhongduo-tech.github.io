  <script>
    // 初始化主题（避免闪白）+ 同步加载正确的 hljs 主题 CSS
    (function() {
      var saved = localStorage.getItem('theme');
      var t = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

      var base = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/';
      document.getElementById('hljs-theme').href = t === 'light'
        ? base + 'github.min.css'
        : base + 'atom-one-dark.min.css';
    })();
  </script>
